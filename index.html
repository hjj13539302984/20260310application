<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对公文本生成应用</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- GSAP 动画库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#60a5fa',
                        glass: {
                            10: 'rgba(255, 255, 255, 0.1)',
                            20: 'rgba(255, 255, 255, 0.2)',
                            30: 'rgba(255, 255, 255, 0.3)',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.37)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-effect {
                @apply bg-glass-20 backdrop-blur-lg rounded-xl border border-white/20 shadow-glass;
            }
            .glass-effect-light {
                @apply bg-glass-10 backdrop-blur-lg rounded-xl border border-white/10 shadow-glass;
            }
            .input-glass {
                @apply bg-glass-10 backdrop-blur-sm border border-white/20 rounded-lg px-3 py-2 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-primary/50;
            }
            .btn-primary {
                @apply bg-primary/80 hover:bg-primary text-white font-medium py-2 px-6 rounded-lg transition-all duration-300 backdrop-blur-sm hover:shadow-lg transform hover:-translate-y-0.5;
            }
            .btn-secondary {
                @apply bg-white/10 hover:bg-white/20 text-white font-medium py-1 px-4 rounded-lg transition-all duration-300 backdrop-blur-sm hover:shadow-md transform hover:-translate-y-0.5;
            }
            .table-header {
                @apply px-4 py-3 text-left text-sm font-medium text-white/90 tracking-wider cursor-pointer hover:bg-white/10 transition-colors;
            }
            .table-cell {
                @apply px-4 py-2 whitespace-nowrap text-sm text-white/80 border-t border-white/10;
            }
            .table-input {
                @apply w-full bg-transparent border-none text-white/90 focus:outline-none focus:ring-1 focus:ring-primary/50;
            }
            .output-item {
                @apply p-3 border border-white/10 rounded-lg mb-2 flex justify-between items-center;
            }
            .fade-in {
                opacity: 0;
                transform: translateY(10px);
            }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-900/80 via-green-800/80 to-blue-900/80 font-sans text-white">
    <div class="min-h-screen bg-black/30 backdrop-blur-sm">
        <div class="container mx-auto px-4 py-8 max-w-6xl">
            <!-- 头部 -->
            <header class="glass-effect p-6 mb-6 fade-in" style="animation-delay: 0.1s;">
                <h1 class="text-3xl font-bold text-center text-white">对公文本生成应用</h1>
            </header>

            <!-- 表格区域 -->
            <section class="glass-effect p-6 mb-6 fade-in" style="animation-delay: 0.2s;">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">数据表格</h2>
                    <div class="flex space-x-2">
                        <button id="clearAllBtn" class="btn-secondary">
                            <i class="fa fa-trash-o mr-1"></i> 清空
                        </button>
                        <button id="addRowBtn" class="btn-secondary">
                            <i class="fa fa-plus mr-1"></i> 添加行
                        </button>
                    </div>
                </div>
                
                <div class="overflow-x-auto">
                    <table id="dataTable" class="w-full">
                        <thead>
                            <tr id="tableHeaders">
                                <th class="table-header" data-field="company">客户名称</th>
                                <th class="table-header" data-field="date">业务日期</th>
                                <th class="table-header" data-field="amount">金额</th>
                                <th class="table-header" data-field="taxRate">税率(%)</th>
                                <th class="table-header" data-field="invoiceAmount">发票金额</th>
                                <th class="table-header" data-field="taxAmount">税额</th>
                                <th class="table-header" data-field="refundAmount">返款</th>
                                <th class="table-header w-12">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- 表格行将通过JavaScript动态生成 -->
                        </tbody>
                    </table>
                </div>
                <div class="mt-4 text-sm text-white/60">
                    <i class="fa fa-info-circle mr-1"></i> 提示：您可以直接从Excel复制多列数据粘贴到表格中
                </div>
            </section>

            <!-- 模板编辑区域 -->
            <section class="glass-effect p-6 mb-6 fade-in" style="animation-delay: 0.3s;">
                <h2 class="text-xl font-semibold mb-4">文本模板</h2>
                <div class="mb-4">
                    <div class="flex items-center mb-2">
                        <label for="templateSelect" class="mr-2 text-white/80">选择模板：</label>
                        <select id="templateSelect" class="input-glass py-1" title="选择要使用的文本模板">
                            <option value="template1" title="-{company}，补{date}月发票税点，货款{amount},开13专票收{taxRate}税点，开票{invoiceAmount}元，补税点{taxAmount} 元。扣除税点 {taxAmount} 元后退回{refundAmount}元；">阿里巴巴模板</option>
                            <option value="template2" title="{company}，补{date}月发票税点，货款{amount}，开13专票收10个点，开票金额是{invoiceAmount}元，税点是{taxAmount}元。">微信模板</option>
                        </select>
                    </div>
                    <textarea id="templateInput" class="input-glass w-full h-24 resize-none" placeholder="请输入文本模板，使用 {字段名} 表示变量，例如：{company}，补{date}月发票税点...">
客户{company}的{date}业务，金额{amount}元，适用税率{taxRate}%，发票金额{invoiceAmount}元，其中税额{taxAmount}元。请按此金额安排付款。
                    </textarea>
                </div>
                <div class="flex justify-end">
                    <button id="generateBtn" class="btn-primary">
                        <i class="fa fa-magic mr-2"></i> 生成文本
                    </button>
                </div>
            </section>

            <!-- 输出结果区域 -->
            <section class="glass-effect p-6 fade-in" style="animation-delay: 0.4s;">
                <h2 class="text-xl font-semibold mb-4">生成结果</h2>
                <div id="outputContainer" class="min-h-[200px]">
                    <div class="text-center text-white/50 py-10" id="emptyOutput">
                        <i class="fa fa-file-text-o text-4xl mb-2"></i>
                        <p>点击"生成文本"按钮生成结果</p>
                    </div>
                    <!-- 生成的文本将在这里显示 -->
                </div>
            </section>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化表格
            const tableBody = document.getElementById('tableBody');
            const templateInput = document.getElementById('templateInput');
            const templateSelect = document.getElementById('templateSelect');
            const outputContainer = document.getElementById('outputContainer');
            const emptyOutput = document.getElementById('emptyOutput');
            const generateBtn = document.getElementById('generateBtn');
            const addRowBtn = document.getElementById('addRowBtn');
            const clearAllBtn = document.getElementById('clearAllBtn');
            const tableHeaders = document.getElementById('tableHeaders');
            
            // 定义模板
            const templates = {
                template1: '-{company}，补{date}月发票税点，货款{amount},开13专票收{taxRate}税点，开票{invoiceAmount}元，补税点{taxAmount} 元。扣除税点 {taxAmount} 元后退回{refundAmount}元；',
                template2: '{company}，补{date}月发票税点，货款{amount}，开13专票收10个点，开票金额是{invoiceAmount}元，税点是{taxAmount}元。'
            };
            
            // 初始化表格行
            function initializeTable() {
                // 清空表格
                tableBody.innerHTML = '';
                
                // 添加5行空表格
                for (let i = 0; i < 5; i++) {
                    addRow();
                }
                
                // 应用淡入动画
                animateElements();
            }
            
            // 添加新行
            function addRow(data = {}) {
                const row = document.createElement('tr');
                row.className = 'hover:bg-white/5 transition-colors';
                
                const fields = ['company', 'date', 'amount', 'taxRate', 'invoiceAmount', 'taxAmount', 'refundAmount'];
                const fieldNames = ['客户名称', '业务日期', '金额', '税率(%)', '发票金额', '税额', '返款'];
                
                // 创建单元格
                fields.forEach((field, index) => {
                    const cell = document.createElement('td');
                    cell.className = 'table-cell';
                    
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'table-input';
                    input.dataset.field = field;
                    input.value = data[field] || '';
                    input.placeholder = fieldNames[index];
                    
                    cell.appendChild(input);
                    row.appendChild(cell);
                });
                
                // 添加操作列
                const actionCell = document.createElement('td');
                actionCell.className = 'table-cell text-center';
                
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'text-white/60 hover:text-red-400 transition-colors';
                deleteBtn.innerHTML = '<i class="fa fa-times"></i>';
                deleteBtn.onclick = function() {
                    row.remove();
                    updateOutput();
                };
                
                actionCell.appendChild(deleteBtn);
                row.appendChild(actionCell);
                
                tableBody.appendChild(row);
            }
            
            // 生成文本
            function generateText() {
                const template = templateInput.value.trim();
                if (!template) {
                    alert('请输入文本模板');
                    return;
                }
                
                const rows = tableBody.querySelectorAll('tr');
                const outputs = [];
                
                rows.forEach((row, index) => {
                    const inputs = row.querySelectorAll('input');
                    let hasData = false;
                    const data = {};
                    
                    inputs.forEach(input => {
                        const value = input.value.trim();
                        if (value) hasData = true;
                        data[input.dataset.field] = value;
                    });
                    
                    if (hasData) {
                        let output = template;
                        
                        // 替换模板中的变量
                        Object.keys(data).forEach(field => {
                            const regex = new RegExp(`\\{${field}\\}`, 'g');
                            output = output.replace(regex, data[field]);
                        });
                        
                        outputs.push({
                            index: outputs.length + 1,
                            text: output
                        });
                    }
                });
                
                displayOutputs(outputs);
            }
            
            // 显示生成的文本
            function displayOutputs(outputs) {
                outputContainer.innerHTML = '';
                emptyOutput.style.display = outputs.length === 0 ? 'block' : 'none';
                
                outputs.forEach((output, index) => {
                    const outputItem = document.createElement('div');
                    outputItem.className = 'output-item fade-in';
                    outputItem.style.animationDelay = `${0.1 * index}s`;
                    
                    outputItem.innerHTML = `
                        <div class="flex items-start">
                            <span class="bg-primary/30 text-white text-xs font-medium px-2 py-1 rounded mr-3 mt-0.5">${output.index}</span>
                            <p>${output.text}</p>
                        </div>
                        <button class="copy-btn text-white/60 hover:text-white transition-colors" data-text="${output.text}">
                            <i class="fa fa-clipboard"></i>
                        </button>
                    `;
                    
                    outputContainer.appendChild(outputItem);
                });
                
                // 添加复制功能
                document.querySelectorAll('.copy-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const text = this.dataset.text;
                        navigator.clipboard.writeText(text).then(() => {
                            const icon = this.querySelector('i');
                            const originalClass = icon.className;
                            
                            icon.className = 'fa fa-check';
                            setTimeout(() => {
                                icon.className = originalClass;
                            }, 1500);
                        });
                    });
                });
                
                // 应用动画
                animateElements();
            }
            
            // 清空所有数据
            function clearAll() {
                const inputs = tableBody.querySelectorAll('input');
                inputs.forEach(input => {
                    input.value = '';
                });
                updateOutput();
            }
            
            // 更新输出区域
            function updateOutput() {
                const outputs = outputContainer.querySelectorAll('.output-item');
                if (outputs.length > 0) {
                    generateText();
                }
            }
            
            // 处理表格头点击事件（编辑表头）
            tableHeaders.querySelectorAll('th[data-field]').forEach(th => {
                th.addEventListener('dblclick', function() {
                    const originalText = this.textContent.trim();
                    const field = this.dataset.field;
                    
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'input-glass text-sm py-1';
                    input.value = originalText;
                    
                    this.innerHTML = '';
                    this.appendChild(input);
                    input.focus();
                    
                    input.addEventListener('blur', function() {
                        const newText = this.value.trim() || originalText;
                        th.textContent = newText;
                    });
                    
                    input.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') {
                            this.blur();
                        }
                    });
                });
            });
            
            // 处理粘贴事件
            tableBody.addEventListener('paste', function(e) {
                e.preventDefault();
                
                const text = e.clipboardData.getData('text');
                const rows = text.split('\n');
                
                // 获取当前选中的单元格
                const activeElement = document.activeElement;
                if (activeElement && activeElement.classList.contains('table-input')) {
                    const currentRow = activeElement.closest('tr');
                    const currentRowIndex = Array.from(tableBody.children).indexOf(currentRow);
                    const currentCellIndex = Array.from(currentRow.querySelectorAll('input')).indexOf(activeElement);
                    
                    rows.forEach((row, rowIndex) => {
                        const cells = row.split('\t');
                        const targetRowIndex = currentRowIndex + rowIndex;
                        
                        // 确保目标行存在
                        if (targetRowIndex >= tableBody.children.length) {
                            addRow();
                        }
                        
                        const targetRow = tableBody.children[targetRowIndex];
                        
                        cells.forEach((cell, cellIndex) => {
                            const targetCellIndex = currentCellIndex + cellIndex;
                            const targetInput = targetRow.querySelectorAll('input')[targetCellIndex];
                            
                            if (targetInput) {
                                targetInput.value = cell;
                            }
                        });
                    });
                    
                    updateOutput();
                }
            });
            
            // 应用淡入动画
            function animateElements() {
                const fadeElements = document.querySelectorAll('.fade-in');
                
                fadeElements.forEach((element, index) => {
                    if (!element.classList.contains('animated')) {
                        element.classList.add('animated');
                        
                        gsap.to(element, {
                            opacity: 1,
                            y: 0,
                            duration: 0.6,
                            ease: 'power2.out',
                            delay: parseFloat(element.style.animationDelay) || 0
                        });
                    }
                });
            }
            
            // 模板切换功能
            templateSelect.addEventListener('change', function() {
                const selectedTemplate = this.value;
                templateInput.value = templates[selectedTemplate];
            });
            
            // 事件监听
            generateBtn.addEventListener('click', generateText);
            addRowBtn.addEventListener('click', addRow);
            clearAllBtn.addEventListener('click', clearAll);
            
            // 初始化表格
            initializeTable();
            
            // 应用初始动画
            animateElements();
        });
    </script>
</body>
</html>
